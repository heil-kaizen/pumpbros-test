<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <title>PUMPBROS</title>
  <link rel="stylesheet" href="/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Anybody:wght@700;800&family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#111] h-screen w-screen m-0 p-0 flex items-center justify-center overflow-hidden font-body-md text-white">
  <main class="w-full h-full flex justify-center items-center">
    <div class="crt-frame">
      <div class="crt-screen relative bg-sky-200">
        <!-- Scanlines & Vignette Layer -->
        <div class="scanlines"></div>
        <div class="vignette"></div>

        <!-- The actual game canvas -->
        <div class="absolute inset-0 flex flex-col justify-between p-0 m-0 z-0 bg-sky-200">
          <canvas id="game" width="960" height="540" class="w-full h-full game-canvas"></canvas>
        </div>

        <!-- Start Screen UI Overlay (matches canvas size) -->
        <div id="start-screen" class="absolute inset-0 flex flex-col justify-between p-8 z-20 pointer-events-none">
           <!-- Top UI -->
           <div class="flex justify-end items-start gap-4 pointer-events-auto">
             <button id="helpBtn" class="cartridge-btn px-4 py-2 flex flex-col items-center">
               <span class="font-pixel text-[10px] text-white">CONTROLS</span>
             </button>
             <button id="fsBtn" class="cartridge-btn px-4 py-2 flex flex-col items-center">
               <span class="font-pixel text-[10px] text-white">FULLSCREEN</span>
             </button>
           </div>
        </div>

        <!-- Controls Overlay -->
        <div id="controls" class="absolute inset-0 z-30 bg-black/80 hidden flex-col items-center justify-center pointer-events-auto">
          <div class="bg-surface-container-highest border-4 border-primary-container p-6 w-3/4 max-w-lg shadow-[0_0_20px_rgba(57,255,20,0.3)]">
            <h3 class="font-pixel text-xl text-primary-container mb-4 text-center">Controls</h3>
            <table class="w-full text-left font-body-md text-white">
              <tr class="text-secondary-fixed border-b border-white/20"><th class="pb-2">Action</th><th>P1</th><th>P2</th></tr>
              <tr><td class="py-2">Move/Jump</td><td>Arrows</td><td>WASD</td></tr>
              <tr><td class="py-2">Drop/Fastfall</td><td>↓</td><td>S</td></tr>
              <tr><td class="py-2">Light Attack</td><td>X</td><td>J</td></tr>
              <tr><td class="py-2">Heavy Attack</td><td>C</td><td>K</td></tr>
              <tr><td class="py-2">Special</td><td>Z</td><td>L</td></tr>
              <tr><td class="py-2">Shield</td><td>V</td><td>I</td></tr>
            </table>
            <div class="mt-6 text-center">
              <button id="closeHelpBtn" class="cartridge-btn px-6 py-2 border-2 border-primary-container text-primary-container hover:bg-primary-container hover:text-black transition-colors font-pixel text-sm">CLOSE</button>
            </div>
          </div>
        </div>

      </div>
      <!-- CRT Physical Details -->
      <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-12 items-center opacity-30 pointer-events-none">
          <div class="w-4 h-4 rounded-full bg-red-500 shadow-[0_0_10px_red]"></div>
          <div class="flex gap-4">
              <div class="w-8 h-1 bg-white/20"></div>
              <div class="w-8 h-1 bg-white/20"></div>
              <div class="w-8 h-1 bg-white/20"></div>
          </div>
      </div>
    </div>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
